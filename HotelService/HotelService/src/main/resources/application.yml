server:
    port: 8082

spring:
    datasource:
        url: jdbc:postgresql://localhost:5432/microservices
        username: postgres
        password: root
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
    application:
        name: HOTELSERVICE

    config:
        import: optional:configserver:http://localhost:8085

    profiles:
        active: prod


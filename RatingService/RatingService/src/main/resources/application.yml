server:
    port: 8083

spring:
    datasource:
      url: jdbc:postgresql://localhost:5432/ratingdb
      username: postgres
      password: root
      driver-class-name: org.postgresql.Driver
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
    application:
      name: RATINGSERVICE

    config:
      import: optional:configserver:http://localhost:8085

    profiles:
      active: dev

